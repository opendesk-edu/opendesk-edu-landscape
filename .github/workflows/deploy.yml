name: Deploy Landscape

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/generate-data.js
      - name: Check generated data is up to date
        run: git diff --exit-code data/services.js || (echo '❌ data/services.js is stale — run npm run build and commit'; exit 1)
      - name: Validate static files
        run: |
          test -f index.html && echo '✅ index.html'
          test -f styles.css && echo '✅ styles.css'
          test -f script.js && echo '✅ script.js'
          test -f data/services.yaml && echo '✅ data/services.yaml'

  deploy:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v4
      - name: Prepare static files for deployment
        run: |
          mkdir -p _site/data _site/hosted_logos
          cp index.html styles.css script.js _site/
          cp data/services.js data/services.yaml _site/data/
          cp -r hosted_logos/* _site/hosted_logos/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - id: deployment
        uses: actions/deploy-pages@v4
