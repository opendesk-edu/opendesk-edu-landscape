name: Deploy Landscape

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/generate-data.js
      - name: Check generated data is up to date
        run: git diff --exit-code data/services.js || (echo 'data/services.js is stale — run npm run build and commit'; exit 1)
      - name: Validate static files
        run: |
          test -f index.html && echo 'index.html OK'
          test -f styles.css && echo 'styles.css OK'
          test -f script.js && echo 'script.js OK'
          test -f data/services.yaml && echo 'services.yaml OK'

  deploy:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Prepare static files for deployment
        run: |
          mkdir -p _site/data _site/hosted_logos
          cp index.html styles.css script.js _site/
          cp data/services.js data/services.yaml _site/data/
          cp -r hosted_logos/* _site/hosted_logos/
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
